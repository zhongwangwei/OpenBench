{% set name = "colm-openbench" %}
{% set dist_name = name|replace("-", "_") %}
{% set version = "3.0.0b2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ dist_name }}-{{ version }}.tar.gz
  sha256: e83d216b6037e70d46cb80c867ebca4e5c5a0a22d05bade6966b801ff76b424d

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - openbench = openbench.cli.main:cli

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - xarray >=0.19.0
    - numpy >=1.21.0
    - scipy >=1.7.0
    - pandas >=1.3.0
    - netcdf4 >=1.5.7
    - matplotlib-base >=3.4.0
    - cartopy >=0.20.0
    - dask >=2022.1.0
    - joblib >=1.1.0
    - flox >=0.5.0
    - pyyaml >=6.0
    - jinja2 >=3.0.0
    - click >=8.0
    - tqdm >=4.0
    - packaging >=21.0
    # Analysis / plotting / reporting / migration features (part of the default install)
    - scikit-learn >=1.0
    - statsmodels >=0.13
    - seaborn >=0.12
    - xhtml2pdf >=0.2.5
    - f90nml >=1.4.4

test:
  imports:
    - openbench
  commands:
    - openbench --version

about:
  home: https://github.com/CoLM-SYSU/OpenBench
  dev_url: https://github.com/zhongwangwei/OpenBench
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Open Source Land Surface Model Benchmarking System
  description: |
    OpenBench is a fully automated, cross-platform framework for
    benchmarking land surface models (LSMs) against curated reference
    datasets with consistent metrics, visualizations, and reports.

extra:
  recipe-maintainers:
    - zhongwangwei
