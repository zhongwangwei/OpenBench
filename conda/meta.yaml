{% set name = "openbench" %}
{% set version = "3.0.0a1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - openbench = openbench.cli.main:cli

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - xarray >=0.19.0
    - numpy >=1.21.0
    - scipy >=1.7.0
    - pandas >=1.3.0
    - netcdf4 >=1.5.7
    - matplotlib-base >=3.4.0
    - cartopy >=0.20.0
    - dask >=2022.1.0
    - joblib >=1.1.0
    - flox >=0.5.0
    - pyyaml >=6.0
    - jinja2 >=3.0.0
    - click >=8.0
    - platformdirs >=3.0

test:
  imports:
    - openbench
  commands:
    - openbench --version

about:
  home: https://github.com/CoLM-SYSU/OpenBench
  license: MIT
  license_family: MIT
  summary: Open Source Land Surface Model Benchmarking System
  description: |
    OpenBench is a fully automated, cross-platform framework for
    benchmarking land surface models (LSMs) against curated reference
    datasets with consistent metrics, visualizations, and reports.
