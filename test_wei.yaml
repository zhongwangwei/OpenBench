# Migrated from OpenBench-wei/nml/nml-yaml/main-Wei-1.yaml
# 2 CoLM2024 cases × 5 variables (subset for quick test)

project:
  name: Wei_cases-1
  output_dir: ./output
  years: [2004, 2005]

evaluation:
  variables:
    - Gross_Primary_Productivity
    - Evapotranspiration
    - Latent_Heat
    - Sensible_Heat
    - Net_Radiation

reference:
  Gross_Primary_Productivity: FLUXCOM-X-BASE_LowRes
  Evapotranspiration: GLEAM_v4.2a_LowRes
  Latent_Heat: ERA5LAND_LowRes
  Sensible_Heat: GLEAM_v4.2a_LowRes
  Net_Radiation: CLARA_3_LowRes

simulation:
  _defaults:
    model: CoLM2024
    data_type: grid
    grid_res: 0.5
    tim_res: Month
    data_groupby: month

  Case01:
    root_dir: /Volumes/Data01/Simulation/Case01/history
    variables:
      Gross_Primary_Productivity: { varname: f_assim, varunit: "mol m-2 s-1", prefix: "Case01_hist_" }
      Evapotranspiration: { varname: f_fevpa, varunit: "mm s-1", prefix: "Case01_hist_" }
      Latent_Heat: { varname: f_lfevpa, varunit: "w m-2", prefix: "Case01_hist_" }
      Sensible_Heat: { varname: f_fsena, varunit: "w m-2", prefix: "Case01_hist_" }
      Net_Radiation: { varname: f_rnet, varunit: "w m-2", prefix: "Case01_hist_" }

  Case02:
    root_dir: /Volumes/Data01/Simulation/Case02/history
    variables:
      Gross_Primary_Productivity: { varname: f_assim, varunit: "mol m-2 s-1", prefix: "Case02_hist_" }
      Evapotranspiration: { varname: f_fevpa, varunit: "mm s-1", prefix: "Case02_hist_" }
      Latent_Heat: { varname: f_lfevpa, varunit: "w m-2", prefix: "Case02_hist_" }
      Sensible_Heat: { varname: f_fsena, varunit: "w m-2", prefix: "Case02_hist_" }
      Net_Radiation: { varname: f_rnet, varunit: "w m-2", prefix: "Case02_hist_" }

metrics: [bias, RMSE, correlation]
scores: [nBiasScore, nRMSEScore, Overall_Score]

comparison:
  enabled: false
  tim_res: Month
  grid_res: 0.5

options:
  num_cores: 1
  unified_mask: true
  generate_report: false
  data_root: /Volumes/work/Reference/Grid/LowRes
