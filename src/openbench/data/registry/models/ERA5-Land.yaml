name: ERA5-Land
description: "ECMWF ERA5-Land Reanalysis"
data_type: grid
grid_res: 0.1
tim_res: Month
variables:
  Evapotranspiration:
    varname: e
    varunit: "m"
  Latent_Heat:
    varname: slhf
    varunit: "J m-2"
  Sensible_Heat:
    varname: sshf
    varunit: "J m-2"
  Surface_Soil_Temperature:
    varname: stl1
    varunit: "K"
  Surface_Soil_Moisture:
    varname: swvl1
    varunit: "m3 m-3"
  Snow_Water_Equivalent:
    varname: sd
    varunit: "m of water equivalent"
  Snow_Depth:
    varname: sde
    varunit: "m"
  Total_Runoff:
    varname: ro
    varunit: "m"
  Surface_Net_SW_Radiation:
    varname: ssr
    varunit: "J m-2"
  Surface_Net_LW_Radiation:
    varname: str
    varunit: "J m-2"
  Precipitation:
    varname: tp
    varunit: "m"
  Surface_Air_Temperature:
    varname: t2m
    varunit: "K"
