name: CoLM2024
description: "Common Land Model 2024"
data_type: grid
grid_res: 0.5
tim_res: Month
variables:
  Evapotranspiration:
    varname: f_fevpa
    varunit: "mm day-1"
  Latent_Heat:
    varname: f_lfevpa
    varunit: "W m-2"
  Sensible_Heat:
    varname: f_fsena
    varunit: "W m-2"
  Gross_Primary_Productivity:
    varname: f_assim
    varunit: "mol m-2 s-1"
  Net_Radiation:
    varname: f_srnet
    varunit: "W m-2"
  Ground_Heat:
    varname: f_grnd_flux
    varunit: "W m-2"
  Surface_Soil_Temperature:
    varname: f_t_grnd
    varunit: "K"
  Surface_Soil_Moisture:
    varname: f_h2osoi
    varunit: "m3 m-3"
  Total_Runoff:
    varname: f_rnof
    varunit: "mm day-1"
  Surface_Albedo:
    varname: f_alb
    varunit: "-"
