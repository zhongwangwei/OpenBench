# Reference dataset profiles — variable mappings for known datasets.
#
# Works like model_catalog.yaml: defines the standard variable names,
# NC variable names, and units for well-known reference datasets.
#
# When the scanner finds a dataset matching a profile name, it inherits
# the variable mappings automatically. Profiles are keyed by base name
# (without resolution suffix), so GLEAM_v4.2a applies to both
# GLEAM_v4.2a_LowRes and GLEAM_v4.2a_MidRes.
#
# Users can register new profiles via:
#   openbench ref register-profile MyDataset -v "Latent_Heat:LE:W m-2"
#
# Structure:
#   DatasetBaseName:
#     description: ...
#     tim_res: Day          # optional override
#     data_groupby: single  # optional override
#     variables:
#       StandardVarName:
#         varname: ncvar_name
#         varunit: unit string

# ─── Composite station datasets (multi-variable, one NC per station) ─────────

FLUXNET_PLUMBER2:
  description: FLUXNET/PLUMBER2 multi-site flux tower dataset (170 sites)
  tim_res: Hour
  data_groupby: single
  variables:
    Latent_Heat:
      varname: Qle_cor
      varunit: W m-2
    Sensible_Heat:
      varname: Qh_cor
      varunit: W m-2
    Ground_Heat:
      varname: Qg
      varunit: W m-2
    Net_Radiation:
      varname: Rnet
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      varname: SWup
      varunit: W m-2
    Surface_Upward_LW_Radiation:
      varname: LWup
      varunit: W m-2
    Gross_Primary_Productivity:
      varname: GPP
      varunit: mumolCO2 m-2 s-1
    Net_Ecosystem_Exchange:
      varname: NEE
      varunit: mumolCO2 m-2 s-1

FLUX_PLUMBER2:
  scan:
    layout: station_direct
    root_sub_dir: Station/Composite/FLUXNET_PLUMBER2
    nc_sub_dir: dataset
    consume: false
  description: FLUXNET PLUMBER2 flux tower composite (hourly)
  category: Composite
  tim_res: Hour
  data_groupby: single
  fulllist: ${OPENBENCH_REF_ROOT}/Station/Composite/FLUXNET_PLUMBER2/list/FLUXNET_PLUMBER2.csv
  variables:
    Latent_Heat:
      sub_dir: ''
      varname: Qle_cor
      varunit: W m-2
      fallbacks:
        - varname: Qle
          varunit: W m-2
    Sensible_Heat:
      sub_dir: ''
      varname: Qh_cor
      varunit: W m-2
      fallbacks:
        - varname: Qh
          varunit: W m-2
    Ground_Heat:
      sub_dir: ''
      varname: Qg
      varunit: W m-2
    Net_Radiation:
      sub_dir: ''
      varname: Rnet
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      sub_dir: ''
      varname: SWup
      varunit: W m-2
    Surface_Upward_LW_Radiation:
      sub_dir: ''
      varname: LWup
      varunit: W m-2
    Gross_Primary_Productivity:
      sub_dir: ''
      varname: GPP
      varunit: mumolCO2 m-2 s-1
    Net_Ecosystem_Exchange:
      sub_dir: ''
      varname: NEE
      varunit: mumolCO2 m-2 s-1

