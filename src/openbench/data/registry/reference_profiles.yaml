# ─── Grid datasets ───────────────────────────────────────────────────────────
# Base name applies to all resolution variants (LowRes, MidRes, HigRes)

GLEAM_v4.2a:
  description: GLEAM v4.2a global evaporation and soil moisture
  category: Energy
  tim_res: Month
  data_groupby: Year
  scan:
    layout: grid_composite_children
    root_sub_dir: Grid/LowRes/Composite/GLEAM_v4.2
  variables:
    Sensible_Heat:
      child: H
      varname: H
      varunit: W m-2
    Bare_Soil_Evaporation:
      child: Eb
      varname: Eb
      varunit: mm day-1
    Canopy_Evaporation:
      child: Ei
      varname: Ei
      varunit: mm day-1
    Evapotranspiration:
      child: E
      varname: E
      varunit: mm day-1
    Open_Water_Evaporation:
      child: Ew
      sub_dir: Water/Open_Water_Evaporation/GLEAM_v4.2a
      varname: Ew
      varunit: mm day-1
    Root_Zone_Soil_Moisture:
      child: SMrz
      varname: SMrz
      varunit: m3 m-3
    Surface_Soil_Moisture:
      child: SMs
      varname: SMs
      varunit: m3 m-3
    Transpiration:
      child: Et
      varname: Et
      varunit: mm day-1

    Canopy_Transpiration:
      sub_dir: Transpiration/GLEAM_v4.2a
