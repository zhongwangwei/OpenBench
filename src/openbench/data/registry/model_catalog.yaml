CLM5:
  name: CLM5
  description: Community Land Model version 5
  data_type: grid
  grid_res: 1.25
  tim_res: Month
  variables:
    Evapotranspiration:
      varname: QFLX_EVAP_TOT
      varunit: mm day-1
    Latent_Heat:
      varname: EFLX_LH_TOT
      varunit: W m-2
    Sensible_Heat:
      varname: FSH
      varunit: W m-2
    Gross_Primary_Productivity:
      varname: GPP
      varunit: gC m-2 s-1
    Net_Ecosystem_Exchange:
      varname: NEE
      varunit: gC m-2 s-1
    Net_Radiation:
      varname: FSA
      varunit: W m-2
    Total_Runoff:
      varname: QRUNOFF
      varunit: mm day-1
    Surface_Soil_Moisture:
      varname: SOILWATER_10CM
      varunit: kg m-2
    Surface_Soil_Temperature:
      varname: TSOI_10CM
      varunit: K
    Snow_Water_Equivalent:
      varname: H2OSNO
      varunit: mm
    Leaf_Area_Index:
      varname: TLAI
      varunit: m2 m-2
    Surface_Albedo:
      varname: ASA
      varunit: '-'
CoLM2024:
  name: CoLM2024
  description: Common Land Model 2024
  data_type: grid
  grid_res: 0.5
  tim_res: Month
  data_groupby: month
  variables:
    Gross_Primary_Productivity:
      varname: f_gpp
      varunit: g m-2 s-1
      fallbacks:
      - varname: f_assim
        varunit: mol m-2 s-1
        convert: value * 12.011
    Evapotranspiration:
      varname: f_fevpa
      varunit: mm s-1
    Canopy_Transpiration:
      varname: f_etr
      varunit: mm s-1
    Canopy_Interception:
      varname: Canopy_Interception
      varunit: mm s-1
      compute: ds['f_fevpl'] - ds['f_etr']
    Ground_Evaporation:
      varname: f_fevpg
      varunit: mm s-1
    Soil_Evaporation:
      varname: f_fevpg
      varunit: mm s-1
    Total_Runoff:
      varname: f_rnof
      varunit: mm s-1
    Latent_Heat:
      varname: f_lfevpa
      varunit: W m-2
    Sensible_Heat:
      varname: f_fsena
      varunit: W m-2
    Net_Radiation:
      varname: f_rnet
      varunit: W m-2
    Ground_Heat:
      varname: f_fgrnd
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      varname: f_sr
      varunit: W m-2
    Surface_Upward_LW_Radiation:
      varname: f_olrg
      varunit: W m-2
    Surface_Downward_SW_Radiation:
      varname: f_xy_solarin
      varunit: W m-2
    Surface_Downward_LW_Radiation:
      varname: f_xy_frl
      varunit: W m-2
    Surface_Albedo:
      varname: f_alb
      varunit: '-'
    Leaf_Area_Index:
      varname: f_lai
      varunit: m2 m-2
    Surface_Soil_Temperature:
      varname: f_t_grnd
      varunit: K
    Surface_Soil_Moisture:
      varname: f_wliq_soisno
      varunit: m3 m-3
      filter: CoLM
    Root_Zone_Soil_Moisture:
      varname: f_wliq_soisno
      varunit: m3 m-3
      filter: CoLM
    Snow_Water_Equivalent:
      varname: f_scv
      varunit: mm
    Snow_Depth:
      varname: f_snowdp
      varunit: m
    Ecosystem_Respiration:
      varname: f_respc
      varunit: mol m-2 s-1
    Water_Table_Depth:
      varname: f_zwt
      varunit: m
    Surface_Air_Temperature:
      varname: f_tref
      varunit: K
    Veg_Cover_In_Fraction:
      varname: f_sigf
      varunit: m2 m-2
    Net_Ecosystem_Exchange:
      varname: f_nee
      varunit: g m-2 s-1
      fallbacks:
      - varname: f_respc
        varunit: mol m-2 s-1
        convert: value * 12.011 - gpp
    Leaf_Greenness:
      varname: f_green
      varunit: m2 m-2
    Precipitation:
      varname: Precipitation
      varunit: mm s-1
      compute: ds['f_xy_rain'] + ds['f_xy_snow']
    Surface_Net_SW_Radiation:
      varname: Surface_Net_SW_Radiation
      varunit: W m-2
      compute: ds['f_xy_solarin'] - ds['f_sr']
    Surface_Net_LW_Radiation:
      varname: Surface_Net_LW_Radiation
      varunit: W m-2
      compute: ds['f_xy_frl'] - ds['f_olrg']
    Surface_Wind_Speed:
      varname: Surface_Wind_Speed
      varunit: m s-1
      compute: (ds['f_us10m']**2 + ds['f_vs10m']**2)**0.5
    Terrestrial_Water_Storage_Change:
      varname: Terrestrial_Water_Storage_Change
      varunit: mm
      compute: ds['f_wat'].fillna(0) + ds['f_wa'].fillna(0) + ds['f_wdsrf'].fillna(0)
        + ds['f_wetwat'].fillna(0)
    Urban_Anthropogenic_Heat_Flux:
      varname: Urban_Anthropogenic_Heat_Flux
      varunit: W m-2
      compute: ds['f_fhac'] + ds['f_fach'] + ds['f_fhah'] + ds['f_fvehc'] + ds['f_fmeta']
        + ds['f_fwst']
    Crop_Yield_Corn:
      varname: Crop_Yield_Corn
      varunit: t ha-1
      filter: CoLM
    Crop_Yield_Maize:
      varname: Crop_Yield_Maize
      varunit: t ha-1
      filter: CoLM
    Crop_Yield_Soybean:
      varname: Crop_Yield_Soybean
      varunit: t ha-1
      filter: CoLM
    Crop_Yield_Rice:
      varname: Crop_Yield_Rice
      varunit: t ha-1
      filter: CoLM
    Crop_Yield_Wheat:
      varname: Crop_Yield_Wheat
      varunit: t ha-1
      filter: CoLM
ERA5-Land:
  name: ERA5-Land
  description: ECMWF ERA5-Land Reanalysis
  data_type: grid
  grid_res: 0.1
  tim_res: Month
  variables:
    Evapotranspiration:
      varname: e
      varunit: m
    Latent_Heat:
      varname: slhf
      varunit: J m-2
    Sensible_Heat:
      varname: sshf
      varunit: J m-2
    Surface_Soil_Temperature:
      varname: stl1
      varunit: K
    Surface_Soil_Moisture:
      varname: swvl1
      varunit: m3 m-3
    Snow_Water_Equivalent:
      varname: sd
      varunit: m of water equivalent
    Snow_Depth:
      varname: sde
      varunit: m
    Total_Runoff:
      varname: ro
      varunit: m
    Surface_Net_SW_Radiation:
      varname: ssr
      varunit: J m-2
    Surface_Net_LW_Radiation:
      varname: str
      varunit: J m-2
    Precipitation:
      varname: tp
      varunit: m
    Surface_Air_Temperature:
      varname: t2m
      varunit: K
