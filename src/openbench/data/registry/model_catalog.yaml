CABLE:
  data_type: grid
  description: Community Atmosphere Biosphere Land Exchange Land Surface Model
  name: CABLE
  tim_res: Month
  variables:
    Albedo:
      varname: Albedo
      varunit: unitless
    Canopy_Evaporation:
      varname: ECanop
      varunit: kg m-2 s-1
    Canopy_Sensible_Heat:
      varname: HVeg
      varunit: W m-2
    Canopy_Transpiration:
      varname: TVeg
      varunit: kg m-2 s-1
    Ecosystem_Respiration:
      compute: "ds['AutoResp'] + ds['HeteroResp']"
      varname: Ecosystem_Respiration
      varunit: mumolco2 m-2 s-1
    Evapotranspiration:
      varname: Evap
      varunit: kg m-2 s-1
    Gross_Primary_Productivity:
      varname: GPP
      varunit: mumolco2 m-2 s-1
    Ground_Evaporation:
      varname: ESoil
      varunit: kg m-2 s-1
    Ground_Heat:
      varname: Qg
      varunit: W m-2
    Ground_Sensible_Heat:
      varname: HSoil
      varunit: W m-2
    Groundwater_Recharge_Rate:
      varname: Qrecharge
      varunit: mm s-1
    Latent_Heat:
      varname: Qle
      varunit: W m-2
    Leaf_Area_Index:
      varname: LAI
      varunit: unitless
    Net_Ecosystem Exchange:
      varname: NEE
      varunit: mumolco2 m-2 s-1
    Net_Ecosystem_Exchange:
      varname: NEE
      varunit: mumolco2 m-2 s-1
    Net_Radiation:
      varname: Rnet
      varunit: W m-2
    Precipitation:
      varname: Rainf
      varunit: kg m-2 s-1
    Root-Zone_Soil_Moisture:
      compute: "(ds['SoilMoist'] * ds['zse']).sum('soil') / ds['zse'].sum('soil') if 'SoilMoist' in ds and 'soil' in ds['SoilMoist'].dims and 'zse' in ds else ds['SoilMoist'].mean('soil') if 'SoilMoist' in ds and 'soil' in ds['SoilMoist'].dims else ds['SoilMoist']"
      varname: Root-Zone_Soil_Moisture
      varunit: m3 m-3
    Root_Zone_Soil_Moisture:
      compute: "(ds['SoilMoist'] * ds['zse']).sum('soil') / ds['zse'].sum('soil') if 'SoilMoist' in ds and 'soil' in ds['SoilMoist'].dims and 'zse' in ds else ds['SoilMoist'].mean('soil') if 'SoilMoist' in ds and 'soil' in ds['SoilMoist'].dims else ds['SoilMoist']"
      varname: Root_Zone_Soil_Moisture
      varunit: m3 m-3
    Sensible_Heat:
      varname: Qh
      varunit: W m-2
    Snow_Depth:
      varname: SnowDepth
      varunit: m
    Snow_Water_Equivalent:
      varname: SWE
      varunit: kg m-2
    Soil_Evaporation:
      varname: ESoil
      varunit: kg m-2 s-1
    Subsurface_Runoff:
      varname: Qsb
      varunit: kg m-2 s-1
    Surface_Air_Temperature:
      varname: Tair
      varunit: K
    Surface_Albedo:
      varname: Albedo
      varunit: unitless
    Surface_Downward_LW_Radiation:
      varname: LWdown
      varunit: W m-2
    Surface_Downward_SW_Radiation:
      varname: SWdown
      varunit: W m-2
    Surface_Net_LW_Radiation:
      varname: LWnet
      varunit: W m-2
    Surface_Net_SW_Radiation:
      varname: SWnet
      varunit: W m-2
    Surface_Pressure:
      varname: PSurf
      varunit: hPa
    Surface_Runoff:
      varname: Qs
      varunit: kg m-2 s-1
    Surface_Soil_Moisture:
      compute: "ds['SoilMoist'].isel(soil=0) if 'soil' in ds['SoilMoist'].dims else ds['SoilMoist']"
      varname: Surface_Soil_Moisture
      varunit: m3 m-3
    Surface_Soil_Temperature:
      compute: "ds['SoilTemp'].isel(soil=0) if 'soil' in ds['SoilTemp'].dims else ds['SoilTemp']"
      varname: Surface_Soil_Temperature
      varunit: K
    Surface_Specific_Humidity:
      varname: Qair
      varunit: unitless
    Surface_Upward_LW_Radiation:
      compute: "ds['LWdown'] - ds['LWnet']"
      varname: Surface_Upward_LW_Radiation
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      compute: "ds['SWdown'] - ds['SWnet']"
      varname: Surface_Upward_SW_Radiation
      varunit: W m-2
    Surface_Wind_Speed:
      varname: Wind
      varunit: m s-1
    Total_Runoff:
      compute: "ds['Qs'] + ds['Qsb']"
      varname: Total_Runoff
      varunit: kg m-2 s-1
    Water_Table_Depth:
      varname: WatTable
      varunit: m
