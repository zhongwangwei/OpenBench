CLM5:
  name: CLM5
  description: Community Land Model version 5
  data_type: grid
  grid_res: 1.25
  tim_res: Month
  variables:
    Evapotranspiration: &id001
      varname: QFLX_EVAP_TOT
      varunit: mm day-1
    Latent_Heat: &id002
      varname: EFLX_LH_TOT
      varunit: W m-2
    Sensible_Heat: &id003
      varname: FSH
      varunit: W m-2
    Gross_Primary_Productivity: &id004
      varname: GPP
      varunit: gC m-2 s-1
    Net_Ecosystem_Exchange: &id005
      varname: NEE
      varunit: gC m-2 s-1
    Net_Radiation: &id006
      varname: Net_Radiation
      varunit: W m-2
      compute: ds['FSDS'] - ds['FSR'] + ds['FLDS'] - ds['FIRE']
    Total_Runoff: &id007
      varname: QRUNOFF
      varunit: mm day-1
    Surface_Soil_Moisture: &id008
      varname: Surface_Soil_Moisture
      varunit: m3 m-3
      compute: (ds['SOILLIQ'].isel(levsoi=0) + ds['SOILLIQ'].isel(levsoi=1)) / 0.06
        / 1000.0
    Surface_Soil_Temperature: &id009
      varname: TSOI_10CM
      varunit: K
    Snow_Water_Equivalent: &id010
      varname: H2OSNO
      varunit: mm
    Leaf_Area_Index: &id011
      varname: TLAI
      varunit: m2 m-2
    Surface_Albedo: &id012
      varname: Surface_Albedo
      varunit: '-'
      compute: ds['FSR'] / ds['FSDS']
    Surface_Net_LW_Radiation: &id013
      varname: FIRA
      varunit: W m-2
      compute: -ds['FIRA']
    Root_Zone_Soil_Moisture: &id014
      varname: Root_Zone_Soil_Moisture
      varunit: m3 m-3
      compute: (ds['SOILLIQ'].isel(levsoi=0) + ds['SOILLIQ'].isel(levsoi=1) + ds['SOILLIQ'].isel(levsoi=2)
        + ds['SOILLIQ'].isel(levsoi=3) + ds['SOILLIQ'].isel(levsoi=4) + ds['SOILLIQ'].isel(levsoi=5)
        + ds['SOILLIQ'].isel(levsoi=6) + ds['SOILLIQ'].isel(levsoi=7) + ds['SOILLIQ'].isel(levsoi=8)
        * 0.29) / 1000.0
    Ground_Heat: &id015
      varname: Ground_Heat
      varunit: W m-2
      compute: ds['FSDS'] - ds['FSR'] + ds['FLDS'] - ds['FIRE'] - ds['FSH'] - ds['EFLX_LH_TOT']
  time_offset:
    Month:
      default: -1 months
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 months
    Day:
      default: -1 days
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 days
    Hour:
      default: -1 hours
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 hours
CoLM2024:
  name: CoLM2024
  description: Common Land Model 2024
  data_type: grid
  grid_res: 0.5
  tim_res: Month
  data_groupby: month
  variables:
    Gross_Primary_Productivity:
      varname: f_gpp
      varunit: g m-2 s-1
      fallbacks:
      - varname: f_assim
        varunit: mol m-2 s-1
        convert: value * 12.011
    Evapotranspiration:
      varname: f_fevpa
      varunit: mm s-1
    Canopy_Transpiration:
      varname: f_etr
      varunit: mm s-1
    Canopy_Interception:
      varname: Canopy_Interception
      varunit: mm s-1
      compute: ds['f_fevpl'] - ds['f_etr']
    Ground_Evaporation:
      varname: f_fevpg
      varunit: mm s-1
    Soil_Evaporation:
      varname: f_fevpg
      varunit: mm s-1
    Total_Runoff:
      varname: f_rnof
      varunit: mm s-1
    Latent_Heat:
      varname: f_lfevpa
      varunit: W m-2
    Sensible_Heat:
      varname: f_fsena
      varunit: W m-2
    Net_Radiation:
      varname: f_rnet
      varunit: W m-2
    Ground_Heat:
      varname: f_fgrnd
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      varname: f_sr
      varunit: W m-2
    Surface_Upward_LW_Radiation:
      varname: f_olrg
      varunit: W m-2
    Surface_Downward_SW_Radiation:
      varname: f_xy_solarin
      varunit: W m-2
    Surface_Downward_LW_Radiation:
      varname: f_xy_frl
      varunit: W m-2
    Surface_Albedo:
      varname: Surface_Albedo
      varunit: '-'
      compute: ds['f_sr'] / ds['f_xy_solarin']
    Leaf_Area_Index:
      varname: f_lai
      varunit: m2 m-2
    Surface_Soil_Temperature:
      varname: f_t_grnd
      varunit: K
    Surface_Soil_Moisture:
      varname: Surface_Soil_Moisture
      varunit: m3 m-3
      compute: (ds['f_wliq_soisno'].isel(soilsnow=5) + ds['f_wliq_soisno'].isel(soilsnow=6))
        / 0.0626 / 1000.0
    Root_Zone_Soil_Moisture:
      varname: Root_Zone_Soil_Moisture
      varunit: m3 m-3
      compute: (ds['f_wliq_soisno'].isel(soilsnow=5) + ds['f_wliq_soisno'].isel(soilsnow=6)
        + ds['f_wliq_soisno'].isel(soilsnow=7) + ds['f_wliq_soisno'].isel(soilsnow=8)
        + ds['f_wliq_soisno'].isel(soilsnow=9) + ds['f_wliq_soisno'].isel(soilsnow=10)
        + ds['f_wliq_soisno'].isel(soilsnow=11) + ds['f_wliq_soisno'].isel(soilsnow=12)
        * 0.31) / 1000.0
    Snow_Water_Equivalent:
      varname: f_scv
      varunit: mm
    Snow_Depth:
      varname: f_snowdp
      varunit: m
    Ecosystem_Respiration:
      varname: f_respc
      varunit: mol m-2 s-1
    Water_Table_Depth:
      varname: f_zwt
      varunit: m
    Surface_Air_Temperature:
      varname: f_tref
      varunit: K
    Veg_Cover_In_Fraction:
      varname: f_sigf
      varunit: m2 m-2
    Net_Ecosystem_Exchange:
      varname: f_nee
      varunit: g m-2 s-1
      fallbacks:
      - varname: f_respc
        varunit: mol m-2 s-1
        convert: value * 12.011 - gpp
    Leaf_Greenness:
      varname: f_green
      varunit: m2 m-2
    Precipitation:
      varname: Precipitation
      varunit: mm s-1
      compute: ds['f_xy_rain'] + ds['f_xy_snow']
    Surface_Net_SW_Radiation:
      varname: Surface_Net_SW_Radiation
      varunit: W m-2
      compute: ds['f_xy_solarin'] - ds['f_sr']
    Surface_Net_LW_Radiation:
      varname: Surface_Net_LW_Radiation
      varunit: W m-2
      compute: ds['f_xy_frl'] - ds['f_olrg']
    Surface_Wind_Speed:
      varname: Surface_Wind_Speed
      varunit: m s-1
      compute: (ds['f_us10m']**2 + ds['f_vs10m']**2)**0.5
    Terrestrial_Water_Storage_Change:
      varname: Terrestrial_Water_Storage_Change
      varunit: mm
      compute: ds['f_wat'].fillna(0) + ds['f_wa'].fillna(0) + ds['f_wdsrf'].fillna(0)
        + ds['f_wetwat'].fillna(0)
    Urban_Anthropogenic_Heat_Flux:
      varname: Urban_Anthropogenic_Heat_Flux
      varunit: W m-2
      compute: ds['f_fhac'] + ds['f_fach'] + ds['f_fhah'] + ds['f_fvehc'] + ds['f_fmeta']
        + ds['f_fwst']
    Crop_Yield_Corn:
      varname: Crop_Yield_Corn
      varunit: t ha-1
      compute: total_area = ds['area_rainfed_temp_corn'].fillna(0) + ds['area_irrigated_temp_corn'].fillna(0)
        + ds['area_rainfed_trop_corn'].fillna(0) + ds['area_irrigated_trop_corn'].fillna(0);
        ((ds['f_cropprodc_rainfed_temp_corn'].fillna(0) * ds['area_rainfed_temp_corn'].fillna(0)
        + ds['f_cropprodc_irrigated_temp_corn'].fillna(0) * ds['area_irrigated_temp_corn'].fillna(0)
        + ds['f_cropprodc_rainfed_trop_corn'].fillna(0) * ds['area_rainfed_trop_corn'].fillna(0)
        + ds['f_cropprodc_irrigated_trop_corn'].fillna(0) * ds['area_irrigated_trop_corn'].fillna(0))
        * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
    Crop_Yield_Maize:
      varname: Crop_Yield_Maize
      varunit: t ha-1
      compute: total_area = ds['area_rainfed_temp_corn'].fillna(0) + ds['area_irrigated_temp_corn'].fillna(0)
        + ds['area_rainfed_trop_corn'].fillna(0) + ds['area_irrigated_trop_corn'].fillna(0);
        ((ds['f_cropprodc_rainfed_temp_corn'].fillna(0) * ds['area_rainfed_temp_corn'].fillna(0)
        + ds['f_cropprodc_irrigated_temp_corn'].fillna(0) * ds['area_irrigated_temp_corn'].fillna(0)
        + ds['f_cropprodc_rainfed_trop_corn'].fillna(0) * ds['area_rainfed_trop_corn'].fillna(0)
        + ds['f_cropprodc_irrigated_trop_corn'].fillna(0) * ds['area_irrigated_trop_corn'].fillna(0))
        * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
    Crop_Yield_Soybean:
      varname: Crop_Yield_Soybean
      varunit: t ha-1
      compute: total_area = ds['area_rainfed_temp_soybean'].fillna(0) + ds['area_irrigated_temp_soybean'].fillna(0)
        + ds['area_rainfed_trop_soybean'].fillna(0) + ds['area_irrigated_trop_soybean'].fillna(0);
        ((ds['f_cropprodc_rainfed_temp_soybean'].fillna(0) * ds['area_rainfed_temp_soybean'].fillna(0)
        + ds['f_cropprodc_irrigated_temp_soybean'].fillna(0) * ds['area_irrigated_temp_soybean'].fillna(0)
        + ds['f_cropprodc_rainfed_trop_soybean'].fillna(0) * ds['area_rainfed_trop_soybean'].fillna(0)
        + ds['f_cropprodc_irrigated_trop_soybean'].fillna(0) * ds['area_irrigated_trop_soybean'].fillna(0))
        * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
    Crop_Yield_Rice:
      varname: Crop_Yield_Rice
      varunit: t ha-1
      compute: total_area = ds['area_rainfed_rice'].fillna(0) + ds['area_irrigated_rice'].fillna(0);
        ((ds['f_cropprodc_rainfed_rice'].fillna(0) * ds['area_rainfed_rice'].fillna(0)
        + ds['f_cropprodc_irrigated_rice'].fillna(0) * ds['area_irrigated_rice'].fillna(0))
        * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
    Crop_Yield_Wheat:
      varname: Crop_Yield_Wheat
      varunit: t ha-1
      compute: total_area = ds['area_rainfed_spwheat'].fillna(0) + ds['area_irrigated_spwheat'].fillna(0)
        + ds['area_rainfed_wtwheat'].fillna(0) + ds['area_irrigated_wtwheat'].fillna(0);
        ((ds['f_cropprodc_rainfed_spwheat'].fillna(0) * ds['area_rainfed_spwheat'].fillna(0)
        + ds['f_cropprodc_irrigated_spwheat'].fillna(0) * ds['area_irrigated_spwheat'].fillna(0)
        + ds['f_cropprodc_rainfed_wtwheat'].fillna(0) * ds['area_rainfed_wtwheat'].fillna(0)
        + ds['f_cropprodc_irrigated_wtwheat'].fillna(0) * ds['area_irrigated_wtwheat'].fillna(0))
        * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
    Streamflow:
      varname: outflw
      varunit: m3 s-1
      prefix_fallback:
      - _cama_
      - _unitcat_
    Dam_Inflow:
      varname: daminf
      varunit: m3 s-1
      prefix_fallback:
      - _cama_
      - _unitcat_
    Dam_Outflow:
      varname: damouf
      varunit: m3 s-1
      prefix_fallback:
      - _cama_
      - _unitcat_
    Dam_Water_Storage:
      varname: damsto
      varunit: m3
      prefix_fallback:
      - _cama_
      - _unitcat_
    Dam_Water_Elevation:
      varname: sfcelv
      varunit: m
      prefix_fallback:
      - _cama_
      - _unitcat_
    Inundation_Fraction:
      varname: fldfrc
      varunit: m2 m-2
      prefix_fallback:
      - _cama_
      - _unitcat_
    Inundation_Area:
      varname: fldare
      varunit: m2
      prefix_fallback:
      - _cama_
      - _unitcat_
    River_Water_Level:
      varname: sfcelv
      varunit: m
      prefix_fallback:
      - _cama_
      - _unitcat_
  time_offset:
    Month:
      default: '0'
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 months
    Day:
      default: '0'
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 days
    Hour:
      default: '0'
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 hours
ERA5-Land:
