CLM5:
  name: CLM5
  description: Community Land Model version 5
  data_type: grid
  grid_res: 1.25
  tim_res: Month
  variables:
    Evapotranspiration:
      varname: QFLX_EVAP_TOT
      varunit: mm day-1
    Latent_Heat:
      varname: EFLX_LH_TOT
      varunit: W m-2
    Sensible_Heat:
      varname: FSH
      varunit: W m-2
    Gross_Primary_Productivity:
      varname: GPP
      varunit: gC m-2 s-1
    Net_Ecosystem_Exchange:
      varname: NEE
      varunit: gC m-2 s-1
    Net_Radiation:
      varname: FSA
      varunit: W m-2
    Total_Runoff:
      varname: QRUNOFF
      varunit: mm day-1
    Surface_Soil_Moisture:
      varname: SOILWATER_10CM
      varunit: kg m-2
    Surface_Soil_Temperature:
      varname: TSOI_10CM
      varunit: K
    Snow_Water_Equivalent:
      varname: H2OSNO
      varunit: mm
    Leaf_Area_Index:
      varname: TLAI
      varunit: m2 m-2
    Surface_Albedo:
      varname: ASA
      varunit: '-'
CoLM2024:
  name: CoLM2024
  description: Common Land Model 2024
  data_type: grid
  grid_res: 0.5
  tim_res: Month
  variables:
    Evapotranspiration:
      varname: f_fevpa
      varunit: mm day-1
    Latent_Heat:
      varname: f_lfevpa
      varunit: W m-2
    Sensible_Heat:
      varname: f_fsena
      varunit: W m-2
    Gross_Primary_Productivity:
      varname: f_assim
      varunit: mol m-2 s-1
    Net_Radiation:
      varname: f_srnet
      varunit: W m-2
    Ground_Heat:
      varname: f_grnd_flux
      varunit: W m-2
    Surface_Soil_Temperature:
      varname: f_t_grnd
      varunit: K
    Surface_Soil_Moisture:
      varname: f_h2osoi
      varunit: m3 m-3
    Total_Runoff:
      varname: f_rnof
      varunit: mm day-1
    Surface_Albedo:
      varname: f_alb
      varunit: '-'
ERA5-Land:
  name: ERA5-Land
  description: ECMWF ERA5-Land Reanalysis
  data_type: grid
  grid_res: 0.1
  tim_res: Month
  variables:
    Evapotranspiration:
      varname: e
      varunit: m
    Latent_Heat:
      varname: slhf
      varunit: J m-2
    Sensible_Heat:
      varname: sshf
      varunit: J m-2
    Surface_Soil_Temperature:
      varname: stl1
      varunit: K
    Surface_Soil_Moisture:
      varname: swvl1
      varunit: m3 m-3
    Snow_Water_Equivalent:
      varname: sd
      varunit: m of water equivalent
    Snow_Depth:
      varname: sde
      varunit: m
    Total_Runoff:
      varname: ro
      varunit: m
    Surface_Net_SW_Radiation:
      varname: ssr
      varunit: J m-2
    Surface_Net_LW_Radiation:
      varname: str
      varunit: J m-2
    Precipitation:
      varname: tp
      varunit: m
    Surface_Air_Temperature:
      varname: t2m
      varunit: K
