  grid_res: 1.25
  name: CLM5
  tim_res: Month
  time_offset:
    Day:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 days
      default: -1 days
    Hour:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 hours
      default: -1 hours
    Month:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 months
      default: -1 months
  variables:
    Ecosystem_Respiration:
      varname: ER
      varunit: g m-2 s-1
    Evapotranspiration: *id001
    Gross_Primary_Productivity:
      varname: GPP
      varunit: g m-2 s-1
    Ground_Heat: *id002
    Latent_Heat: *id003
    Leaf_Area_Index:
      varname: TLAI
      varunit: m2 m-2
    Net_Ecosystem_Exchange:
      varname: NEE
      varunit: g m-2 s-1
    Net_Radiation: *id004
    Root_Zone_Soil_Moisture: *id005
    Sensible_Heat: *id006
    Snow_Water_Equivalent: *id007
    Surface_Albedo: *id008
    Surface_Net_LW_Radiation: *id009
    Surface_Soil_Moisture: *id010
    Surface_Soil_Temperature: *id011
    Total_Runoff: *id012
CaMa:
  data_type: grid
  description: CaMa-Flood River Routing Model
  grid_res: 0.25
  name: CaMa
