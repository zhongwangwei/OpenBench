WRF:
  data_type: grid
  description: Weather Research and Forecasting Model
  name: WRF
  tim_res: Hour
  variables:
    Diurnal_Max_Temperature:
      varname: T2
      varunit: K
    Diurnal_Min_Temperature:
      varname: T2
      varunit: K
    Evapotranspiration:
      compute: ds['LH'] / 2.501e6 * 86400
      varname: Evapotranspiration
      varunit: mm
    Ground_Heat:
      varname: GRDFLX
      varunit: W m-2
    Latent_Heat:
      varname: LH
      varunit: W m-2
    Leaf_Area_Index:
      varname: LAI
      varunit: m2 m-2
    Net_Radiation:
      compute: ds['SWDOWN'] - ds['SWUPB'] + ds['GLW'] - ds['LWUPB']
      varname: Net_Radiation
      varunit: W m-2
    Precipitation:
      varname: RAINNC
      varunit: mm
    Sensible_Heat:
      varname: HFX
      varunit: W m-2
    Snow_Depth:
      varname: SNOWH
      varunit: m
    Snow_Water_Equivalent:
      varname: SNOW
      varunit: kg m-2
    Surface_Air_Temperature:
      varname: T2
      varunit: K
    Surface_Albedo:
      varname: ALBEDO
      varunit: '1'
    Surface_Downward_LW_Radiation:
      varname: GLW
      varunit: W m-2
    Surface_Downward_SW_Radiation:
      varname: SWDOWN
      varunit: W m-2
    Surface_Pressure:
      varname: PSFC
      varunit: Pa
    Surface_Soil_Moisture:
      compute: ds['SMOIS'].isel(soil_layers_stag=0) if 'soil_layers_stag' in ds.dims else ds['SMOIS'].isel(soil=0)
      varname: SMOIS
      varunit: m3 m-3
    Surface_Soil_Temperature:
      compute: ds['TSLB'].isel(soil_layers_stag=0) if 'soil_layers_stag' in ds.dims else ds['TSLB'].isel(soil=0)
      varname: TSLB
      varunit: K
    Surface_Specific_Humidity:
      varname: Q2
      varunit: kg kg-1
    Surface_Upward_LW_Radiation:
      varname: LWUPB
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      varname: SWUPB
      varunit: W m-2
    Wind_Speed_10m:
      compute: (ds['U10']**2 + ds['V10']**2)**0.5
      varname: Wind_Speed_10m
      varunit: m s-1
