BCC_AVIM:
  data_type: grid
  description: BCC-AVIM Land Surface Model
  name: BCC_AVIM
  tim_res: Month
  time_offset:
    Day:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 days
      default: -1 days
    Hour:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 hours
      default: -1 hours
    Month:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 months
      default: -1 months
  variables:
    Canopy_Assimilation_Rate:
      varname: ''
      varunit: mol m-2 s-1
    Ecosystem_Respiration:
      varname: ''
      varunit: mol m-2 s-1
    Evapotranspiration: &id001
      varname: QFLX_EVAP_TOT
      varunit: mm s-1
    Gross_Primary_Productivity:
      varname: ''
      varunit: g m-2 s-1
    Ground_Heat: &id002
      compute: ds['FSDS'] - ds['FSR'] + ds['FLDS'] - ds['FIRE'] - ds['FSH'] - ds['EFLX_LH_TOT']
      varname: Ground_Heat
      varunit: W m-2
    Latent_Heat: &id003
      varname: EFLX_LH_TOT
      varunit: W m-2
    Leaf_Area_Index:
      varname: ELAI
      varunit: m2 m-2
    Net_Radiation: &id004
      compute: ds['FSDS'] - ds['FSR'] + ds['FLDS'] - ds['FIRE']
      varname: Net_Radiation
      varunit: W m-2
    Root_Zone_Soil_Moisture: &id005
      compute: (ds['SOILLIQ'].isel(levsoi=0) + ds['SOILLIQ'].isel(levsoi=1) + ds['SOILLIQ'].isel(levsoi=2) + ds['SOILLIQ'].isel(levsoi=3) + ds['SOILLIQ'].isel(levsoi=4) + ds['SOILLIQ'].isel(levsoi=5) + ds['SOILLIQ'].isel(levsoi=6) + ds['SOILLIQ'].isel(levsoi=7) + ds['SOILLIQ'].isel(levsoi=8) * 0.29) / 1000.0
      varname: Root_Zone_Soil_Moisture
      varunit: m3 m-3
    Sensible_Heat: &id006
      varname: FSH
      varunit: W m-2
    Snow_Water_Equivalent: &id007
      varname: H2OSNO
      varunit: mm
    Surface_Albedo: &id008
      compute: ds['FSR'] / ds['FSDS']
      varname: Surface_Albedo
      varunit: '-'
    Surface_Net_LW_Radiation: &id009
      compute: -ds['FIRA']
      varname: FIRA
      varunit: W m-2
    Surface_Soil_Moisture: &id010
      compute: (ds['SOILLIQ'].isel(levsoi=0) + ds['SOILLIQ'].isel(levsoi=1)) / 0.06 / 1000.0
      varname: Surface_Soil_Moisture
      varunit: m3 m-3
    Surface_Soil_Temperature: &id011
      varname: TSOI_10CM
      varunit: K
    Total_Runoff: &id012
      varname: QRUNOFF
      varunit: mm day-1
    Leaf_Sensible_Heat:
      varname: FSH_V
      varunit: w m-2
    Ground_Sensible_Heat:
      varname: FSH_G
      varunit: w m-2
    Surface_Upward_SW_Radiation:
      varname: FSR
      varunit: w m-2
    Surface_Upward_LW_Radiation:
      varname: FIRE
      varunit: w m-2
    Surface_Net_SW_Radiation:
      varname: FSA
      varunit: w m-2
    Albedo:
      varname: ''
      varunit: unitless
    Veg_Cover_In_Fraction:
      varname: ''
      varunit: m2 m-2
    Leaf_Greenness:
      varname: ''
      varunit: m2 m-2
    Canopy_Evaporation_Canopy_Transpiration:
      varname: ''
      varunit: w m-2
    Canopy_Evaporation:
      varname: ''
      varunit: mm s-1
    Ground_Evaporation:
      varname: QSOIL
      varunit: mm s-1
    Canopy_Transpiration:
      varname: QVEGT
      varunit: mm s-1
    Surface_Runoff:
