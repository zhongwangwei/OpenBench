    Depth_Of_Surface_Water:
      varname: flddph
      varunit: m
    Inundation_Area:
      varname: fldare
      varunit: m2
    Inundation_Fraction:
      varname: fldfrc
      varunit: m2 m-2
    Streamflow:
      varname: outflw
      varunit: m3 s-1
    Streamflow_Ocean:
      varname: outflw_ocean
      varunit: m3 s-1
    Total_Runoff:
      varname: runoff
      varunit: m3 s-1
CoLM2024:
  data_groupby: month
  data_type: grid
  description: Common Land Model 2024
  grid_res: 0.5
  name: CoLM2024
  tim_res: Month
  time_offset:
    Day:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 days
      default: '0'
    Hour:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 hours
      default: '0'
    Month:
      ? Streamflow,Dam_Inflow,Dam_Outflow,Dam_Water_Storage,Dam_Water_Elevation,Inundation_Fraction,Inundation_Area,River_Water_Level,Lake_Water_Level,Lake_Water_Volume
      : -1 months
      default: '0'
  variables:
    Canopy_Evaporation:
      compute: ds['f_fevpl'] - ds['f_etr']
      varname: Canopy_Evaporation
      varunit: mm s-1
    Canopy_Transpiration:
      varname: f_etr
      varunit: mm s-1
    Crop_Yield_Corn:
      compute: total_area = ds['area_rainfed_temp_corn'].fillna(0) + ds['area_irrigated_temp_corn'].fillna(0) + ds['area_rainfed_trop_corn'].fillna(0) + ds['area_irrigated_trop_corn'].fillna(0); ((ds['f_cropprodc_rainfed_temp_corn'].fillna(0) * ds['area_rainfed_temp_corn'].fillna(0) + ds['f_cropprodc_irrigated_temp_corn'].fillna(0) * ds['area_irrigated_temp_corn'].fillna(0) + ds['f_cropprodc_rainfed_trop_corn'].fillna(0) * ds['area_rainfed_trop_corn'].fillna(0) + ds['f_cropprodc_irrigated_trop_corn'].fillna(0) * ds['area_irrigated_trop_corn'].fillna(0)) * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
      varname: Crop_Yield_Corn
      varunit: t ha-1
    Crop_Yield_Maize:
      compute: total_area = ds['area_rainfed_temp_corn'].fillna(0) + ds['area_irrigated_temp_corn'].fillna(0) + ds['area_rainfed_trop_corn'].fillna(0) + ds['area_irrigated_trop_corn'].fillna(0); ((ds['f_cropprodc_rainfed_temp_corn'].fillna(0) * ds['area_rainfed_temp_corn'].fillna(0) + ds['f_cropprodc_irrigated_temp_corn'].fillna(0) * ds['area_irrigated_temp_corn'].fillna(0) + ds['f_cropprodc_rainfed_trop_corn'].fillna(0) * ds['area_rainfed_trop_corn'].fillna(0) + ds['f_cropprodc_irrigated_trop_corn'].fillna(0) * ds['area_irrigated_trop_corn'].fillna(0)) * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
      varname: Crop_Yield_Maize
      varunit: t ha-1
    Crop_Yield_Rice:
      compute: total_area = ds['area_rainfed_rice'].fillna(0) + ds['area_irrigated_rice'].fillna(0); ((ds['f_cropprodc_rainfed_rice'].fillna(0) * ds['area_rainfed_rice'].fillna(0) + ds['f_cropprodc_irrigated_rice'].fillna(0) * ds['area_irrigated_rice'].fillna(0)) * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
      varname: Crop_Yield_Rice
      varunit: t ha-1
    Crop_Yield_Soybean:
      compute: total_area = ds['area_rainfed_temp_soybean'].fillna(0) + ds['area_irrigated_temp_soybean'].fillna(0) + ds['area_rainfed_trop_soybean'].fillna(0) + ds['area_irrigated_trop_soybean'].fillna(0); ((ds['f_cropprodc_rainfed_temp_soybean'].fillna(0) * ds['area_rainfed_temp_soybean'].fillna(0) + ds['f_cropprodc_irrigated_temp_soybean'].fillna(0) * ds['area_irrigated_temp_soybean'].fillna(0) + ds['f_cropprodc_rainfed_trop_soybean'].fillna(0) * ds['area_rainfed_trop_soybean'].fillna(0) + ds['f_cropprodc_irrigated_trop_soybean'].fillna(0) * ds['area_irrigated_trop_soybean'].fillna(0)) * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
      varname: Crop_Yield_Soybean
      varunit: t ha-1
    Crop_Yield_Wheat:
      compute: total_area = ds['area_rainfed_spwheat'].fillna(0) + ds['area_irrigated_spwheat'].fillna(0) + ds['area_rainfed_wtwheat'].fillna(0) + ds['area_irrigated_wtwheat'].fillna(0); ((ds['f_cropprodc_rainfed_spwheat'].fillna(0) * ds['area_rainfed_spwheat'].fillna(0) + ds['f_cropprodc_irrigated_spwheat'].fillna(0) * ds['area_irrigated_spwheat'].fillna(0) + ds['f_cropprodc_rainfed_wtwheat'].fillna(0) * ds['area_rainfed_wtwheat'].fillna(0) + ds['f_cropprodc_irrigated_wtwheat'].fillna(0) * ds['area_irrigated_wtwheat'].fillna(0)) * 1e6 * 2.5e-6 / total_area.where(total_area > 0) * 3600 * 24 * 365) / 100
      varname: Crop_Yield_Wheat
      varunit: t ha-1
    Dam_Inflow:
      fallbacks:
        - varname: qresv_in
          varunit: m3 s-1
      prefix_fallback: &id013
        - _cama_
        - _unitcat_
      varname: daminf
      varunit: m3 s-1
    Dam_Outflow:
      fallbacks:
        - varname: qresv_out
          varunit: m3 s-1
      prefix_fallback: *id013
      varname: damouf
      varunit: m3 s-1
    Dam_Elevation:
      fallbacks:
        - varname: f_sfcelv
          varunit: m
      prefix_fallback: *id013
      varname: sfcelv
      varunit: m
    Dam_Storage:
      fallbacks:
        - varname: volresv
          varunit: m3
      prefix_fallback: *id013
      varname: damsto
      varunit: m3
    Dam_Water_Elevation:
      fallbacks:
        - varname: f_sfcelv
          varunit: m
      prefix_fallback:
        - _cama_
        - _unitcat_
      varname: sfcelv
      varunit: m
    Dam_Water_Storage:
      fallbacks:
        - varname: volresv
          varunit: m3
      prefix_fallback: *id013
      varname: damsto
      varunit: m3
    Ecosystem_Respiration:
      varname: f_respc
      varunit: mol m-2 s-1
    Evapotranspiration:
      varname: f_fevpa
      varunit: mm s-1
    Gross_Primary_Productivity:
      fallbacks:
        - convert: value * 12.011
          varname: f_assim
          varunit: mol m-2 s-1
      varname: f_gpp
      varunit: g m-2 s-1
    Ground_Evaporation:
      varname: f_fevpg
      varunit: mm s-1
    Ground_Heat:
      varname: f_fgrnd
      varunit: W m-2
    Depth_Of_Surface_Water:
      fallbacks:
        - varname: f_flddph
          varunit: m
      prefix_fallback: *id013
      varname: flddph
      varunit: m
    Inundation_Area:
      fallbacks:
        - varname: f_floodarea
          varunit: m2
      prefix_fallback:
        - _cama_
        - _unitcat_
      varname: fldare
      varunit: m2
    Inundation_Fraction:
      fallbacks:
        - varname: f_floodfrc
          varunit: m2 m-2
      prefix_fallback:
        - _cama_
        - _unitcat_
      varname: fldfrc
      varunit: m2 m-2
    Latent_Heat:
      varname: f_lfevpa
      varunit: W m-2
    Leaf_Area_Index:
      varname: f_lai
      varunit: m2 m-2
    Leaf_Greenness:
      varname: f_green
      varunit: m2 m-2
    Net_Ecosystem_Exchange:
      fallbacks:
        - convert: value * 12.011 - f_assim * 12.011
          varname: f_respc
          varunit: mol m-2 s-1
      varname: f_nee
      varunit: g m-2 s-1
    Net_Radiation:
      varname: f_rnet
      varunit: W m-2
    Precipitation:
      compute: ds['f_xy_rain'] + ds['f_xy_snow']
      varname: Precipitation
      varunit: mm s-1
    River_Water_Level:
      fallbacks:
        - varname: f_sfcelv
          varunit: m
        - varname: f_wdpth_ucat
          varunit: m
      prefix_fallback: *id013
      varname: sfcelv
      varunit: m
    Root_Zone_Soil_Moisture:
      compute: (ds['f_wliq_soisno'].isel(soilsnow=5) + ds['f_wliq_soisno'].isel(soilsnow=6) + ds['f_wliq_soisno'].isel(soilsnow=7) + ds['f_wliq_soisno'].isel(soilsnow=8) + ds['f_wliq_soisno'].isel(soilsnow=9) + ds['f_wliq_soisno'].isel(soilsnow=10) + ds['f_wliq_soisno'].isel(soilsnow=11) + ds['f_wliq_soisno'].isel(soilsnow=12) * 0.31) / 1000.0 if 'f_wliq_soisno' in ds else (ds['f_h2osoi'].isel(soil=0) * 0.0175 + ds['f_h2osoi'].isel(soil=1) * 0.0276 + ds['f_h2osoi'].isel(soil=2) * 0.0455 + ds['f_h2osoi'].isel(soil=3) * 0.0749 + ds['f_h2osoi'].isel(soil=4) * 0.1236 + ds['f_h2osoi'].isel(soil=5) * 0.2038) / 0.4929
      varname: Root_Zone_Soil_Moisture
      varunit: m3 m-3
    Sensible_Heat:
      varname: f_fsena
      varunit: W m-2
    Snow_Depth:
      varname: f_snowdp
      varunit: m
    Snow_Water_Equivalent:
      varname: f_scv
      varunit: mm
    Bare_Soil_Evaporation:
      varname: f_fevpg
      varunit: mm s-1
    Streamflow:
      fallbacks:
        - varname: f_discharge
          varunit: m3 s-1
      prefix_fallback: *id013
      varname: outflw
      varunit: m3 s-1
    Streamflow_Ocean:
      fallbacks:
        - varname: f_discharge_rivermouth
          varunit: m3 s-1
      prefix_fallback: *id013
      varname: outflw_ocean
      varunit: m3 s-1
    Surface_Air_Temperature:
      varname: f_tref
      varunit: K
    Surface_Albedo:
      compute: ds['f_sr'] / ds['f_xy_solarin']
      varname: Surface_Albedo
      varunit: '-'
    Surface_Downward_LW_Radiation:
      varname: f_xy_frl
      varunit: W m-2
    Surface_Downward_SW_Radiation:
      varname: f_xy_solarin
      varunit: W m-2
    Surface_Net_LW_Radiation:
      compute: ds['f_xy_frl'] - ds['f_olrg']
      varname: Surface_Net_LW_Radiation
      varunit: W m-2
    Surface_Net_SW_Radiation:
      compute: ds['f_xy_solarin'] - ds['f_sr']
      varname: Surface_Net_SW_Radiation
      varunit: W m-2
    Surface_Soil_Moisture:
      compute: (ds['f_wliq_soisno'].isel(soilsnow=5) + ds['f_wliq_soisno'].isel(soilsnow=6)) / 0.0626 / 1000.0 if 'f_wliq_soisno' in ds else (ds['f_h2osoi'].isel(soil=0) * 0.0175 + ds['f_h2osoi'].isel(soil=1) * 0.0276 + ds['f_h2osoi'].isel(soil=2) * 0.0455) / 0.0906
      varname: Surface_Soil_Moisture
      varunit: m3 m-3
    Surface_Soil_Temperature:
      varname: f_t_grnd
      varunit: K
    Surface_Upward_LW_Radiation:
      varname: f_olrg
      varunit: W m-2
    Surface_Upward_SW_Radiation:
      varname: f_sr
      varunit: W m-2
    Surface_Wind_Speed:
      compute: (ds['f_us10m']**2 + ds['f_vs10m']**2)**0.5
      varname: Surface_Wind_Speed
      varunit: m s-1
    Terrestrial_Water_Storage_Change:
      compute: ds['f_wat'].fillna(0) + ds['f_wa'].fillna(0) + ds['f_wdsrf'].fillna(0) + ds['f_wetwat'].fillna(0)
      varname: Terrestrial_Water_Storage_Change
      varunit: mm
    Total_Water_Storage:
      prefix_fallback: *id013
      varname: f_storge
      varunit: m3
    Total_Runoff:
      varname: f_rnof
      varunit: mm s-1
    Urban_Anthropogenic_Heat_Flux:
      compute: ds['f_fhac'] + ds['f_fach'] + ds['f_fhah'] + ds['f_fvehc'] + ds['f_fmeta'] + ds['f_fwst']
      varname: Urban_Anthropogenic_Heat_Flux
      varunit: W m-2
    Veg_Cover_In_Fraction:
      varname: f_sigf
      varunit: m2 m-2
    Water_Table_Depth:
      varname: f_zwt
      varunit: m
    Canopy_Interception:
      varname: f_qintr
      varunit: mm s-1
    Runoff:
      varname: f_rsur
      varunit: mm s-1
    Snowfall:
      varname: f_xy_snow
      varunit: mm s-1
    Latent_Heat_Flux:
      varname: f_lfevpa
      varunit: W m-2
    Sensible_Heat_Flux:
      varname: f_fsena
      varunit: W m-2
    Soil_Moisture_Lev2:
