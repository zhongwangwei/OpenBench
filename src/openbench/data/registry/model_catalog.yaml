  description: ECMWF ERA5-Land Reanalysis
  data_type: grid
  grid_res: 0.1
  tim_res: Month
  variables:
    Evapotranspiration:
      varname: e
      varunit: m
    Latent_Heat:
      varname: slhf
      varunit: J m-2
    Sensible_Heat:
      varname: sshf
      varunit: J m-2
    Surface_Soil_Temperature:
      varname: stl1
      varunit: K
    Surface_Soil_Moisture:
      varname: swvl1
      varunit: m3 m-3
    Snow_Water_Equivalent:
      varname: sd
      varunit: m of water equivalent
    Snow_Depth:
      varname: sde
      varunit: m
    Total_Runoff:
      varname: ro
      varunit: m
    Surface_Net_SW_Radiation:
      varname: ssr
      varunit: J m-2
    Surface_Net_LW_Radiation:
      varname: str
      varunit: J m-2
    Precipitation:
      varname: tp
      varunit: m
    Surface_Air_Temperature:
      varname: t2m
      varunit: K
GLDAS:
  name: GLDAS
  description: GLDAS-2.2 Noah Model
  data_type: grid
  grid_res: 0.25
  tim_res: 3Hour
  variables:
    Latent_Heat:
      varname: Qle_tavg
      varunit: W m-2
    Sensible_Heat:
      varname: Qh_tavg
      varunit: W m-2
    Ground_Heat:
      varname: Qg_tavg
      varunit: W m-2
    Net_Radiation:
      varname: Net_Radiation
      varunit: W m-2
      compute: ds['Swnet_tavg'] + ds['Lwnet_tavg']
    Surface_Upward_SW_Radiation:
      varname: Surface_Upward_SW_Radiation
      varunit: W m-2
      compute: ds['SWdown_f_tavg'] - ds['Swnet_tavg']
    Surface_Upward_LW_Radiation:
      varname: Surface_Upward_LW_Radiation
      varunit: W m-2
      compute: ds['LWdown_f_tavg'] - ds['Lwnet_tavg']
    Total_Runoff:
      varname: Total_Runoff
      varunit: mm 3hour-1
      compute: ds['Qs_acc'] + ds['Qsb_acc'] + ds['Qsm_acc']
    Surface_Soil_Moisture:
      varname: SoilMoi00_10cm_inst
      varunit: kg m-2
    Surface_Soil_Temperature:
      varname: SoilTMP0_10cm_inst
      varunit: K
    Snow_Water_Equivalent:
      varname: SWE_inst
      varunit: kg m-2
    Evapotranspiration:
      varname: Evap_tavg
      varunit: kg m-2 s-1
SMAP_L4:
  name: SMAP_L4
  description: SMAP Level 4 Soil Moisture
  data_type: grid
  grid_res: 0.09
  tim_res: Day
  variables:
    Surface_Soil_Moisture:
      varname: sm_surface
      varunit: m3 m-3
