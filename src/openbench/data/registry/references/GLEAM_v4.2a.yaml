name: GLEAM_v4.2a
description: "Global Land Evaporation Amsterdam Model v4.2a"
category: Water
data_type: grid
grid_res: 0.25
tim_res: Month
data_groupby: Year
timezone: 0
years: [1980, 2023]
variables:
  Evapotranspiration:
    varname: E
    varunit: "mm day-1"
    prefix: "E_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Evapotranspiration/GLEAM_v4.2a"
  Canopy_Interception:
    varname: Ei
    varunit: "mm day-1"
    prefix: "Ei_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Canopy_Interception/GLEAM_v4.2a"
  Canopy_Transpiration:
    varname: Et
    varunit: "mm day-1"
    prefix: "Et_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Canopy_Transpiration/GLEAM_v4.2a"
  Bare_Soil_Evaporation:
    varname: Eb
    varunit: "mm day-1"
    prefix: "Eb_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Bare_Soil_Evaporation/GLEAM_v4.2a"
  Root_Zone_Soil_Moisture:
    varname: SMroot
    varunit: "m3 m-3"
    prefix: "SMroot_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Root_Zone_Soil_Moisture/GLEAM_v4.2a"
  Surface_Soil_Moisture:
    varname: SMsurf
    varunit: "m3 m-3"
    prefix: "SMsurf_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Surface_Soil_Moisture/GLEAM_v4.2a"
  Sensible_Heat:
    varname: H
    varunit: "W m-2"
    prefix: "H_"
    suffix: "_GLEAM_v4.2a"
    sub_dir: "Sensible_Heat/GLEAM_v4.2a"
