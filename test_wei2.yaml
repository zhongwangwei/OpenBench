project:
  name: Wei_cases-1
  output_dir: ./output
  years:
  - 2000
  - 2010
  min_year_threshold: 1.0
evaluation:
  variables:
  - Gross_Primary_Productivity
  - Canopy_Interception
  - Evapotranspiration
  - Surface_Soil_Moisture
  - Total_Runoff
  - Ground_Heat
  - Latent_Heat
  - Net_Radiation
  - Sensible_Heat
  - Surface_Net_LW_Radiation
  - Surface_Net_SW_Radiation
  - Surface_Upward_LW_Radiation
reference:
  Gross_Primary_Productivity: FLUXCOM-X-BASE_LowRes
  Canopy_Interception: GLEAM_v4.2a_LowRes
  Evapotranspiration: GLEAM_v4.2a_LowRes
  Surface_Soil_Moisture: GLEAM_v4.2a_LowRes
  Total_Runoff: GRUN_ENSEMBLE_LowRes
  Ground_Heat: GLDAS-2.2_LowRes
  Latent_Heat: ERA5LAND_LowRes
  Net_Radiation: CLARA_3_LowRes
  Sensible_Heat: GLEAM_v4.2a_LowRes
  Surface_Net_LW_Radiation: CLARA_3_LowRes
  Surface_Net_SW_Radiation: CLARA_3_LowRes
  Surface_Upward_LW_Radiation: CLARA_3_LowRes
simulation:
  _defaults:
    model: CoLM2024
    data_type: grid
    grid_res: 0.5
    tim_res: month
    data_groupby: month
  Case01:
    root_dir: ./dataset/Simulation/Case01/history/
    prefix: Case01_hist_
  Case02:
    root_dir: ./dataset/Simulation/Case02/history/
    prefix: Case02_hist_
  Case03:
    root_dir: ./dataset/Simulation/Case03/history/
    prefix: Case03_hist_
  Case04:
    root_dir: ./dataset/Simulation/Case04/history/
    prefix: Case04_hist_
  Case05:
    root_dir: ./dataset/Simulation/Case05/history/
    prefix: Case05_hist_
  Case06:
    root_dir: ./dataset/Simulation/Case06/history/
    prefix: Case06_hist_
  Case07:
    root_dir: ./dataset/Simulation/Case07/history/
    prefix: Case07_hist_
  Case08:
    root_dir: ./dataset/Simulation/Case08/history/
    prefix: Case08_hist_
  Case09:
    root_dir: ./dataset/Simulation/Case09/history/
    prefix: Case09_hist_
  Case11:
    root_dir: ./dataset/Simulation/Case11/history/
    prefix: Case11_hist_
  Case12:
    root_dir: ./dataset/Simulation/Case12/history/
    prefix: Case12_hist_
metrics:
- bias
- RMSE
- correlation
- MFM
scores:
- nBiasScore
- nRMSEScore
- Overall_Score
comparison:
  enabled: true
  items:
  - Kernel_Density_Estimate
  - Parallel_Coordinates
  - Ridgeline_Plot
options:
  num_cores: 48
  unified_mask: true
  generate_report: false
  IGBP_groupby: true
  PFT_groupby: true
  climate_zone_groupby: true
